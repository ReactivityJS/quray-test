<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="QuRay Chat - Dezentraler P2P Messenger">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111118">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>QuRay Chat</title>
<link rel="stylesheet" href="/demo/lib/demo-shell.css">
<link rel="stylesheet" href="/src/plugins/messenger/ui/messenger.css">
<style>
body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.chat-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.chat-topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}

.chat-topbar-title {
  font-size: 16px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chat-topbar-actions {
  display: flex;
  gap: 8px;
}

.chat-topbar-actions button {
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 6px;
  transition: all 0.15s;
}

.chat-topbar-actions button:hover {
  background: var(--bg);
  border-color: var(--primary);
}

.chat-main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

qm-sidebar {
  min-width: 280px;
  max-width: 360px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
}

#app-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

qm-chat {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
}

qm-composer {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}

/* Loading & Setup Screens */
#screen-loading, #screen-setup {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  flex-direction: column;
  gap: 20px;
}

#screen-loading[hidden], #screen-setup[hidden] {
  display: none;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.setup-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 340px;
  padding: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
}

.setup-form h2 {
  margin: 0 0 8px;
  font-size: 18px;
}

.setup-form input {
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
}

.setup-form button {
  padding: 10px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
}

.setup-form button:hover {
  opacity: 0.9;
}

/* Dialogs */
.dialog-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.dialog-overlay[hidden] {
  display: none;
}

.dialog-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  max-width: 400px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}

.dialog-box h2 {
  margin: 0 0 12px;
  font-size: 16px;
}

.dialog-box input, .dialog-box select {
  display: block;
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  box-sizing: border-box;
}

.dialog-buttons {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 16px;
}

.dialog-buttons button {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
}

.dialog-buttons button.primary {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

.dialog-buttons button:hover {
  opacity: 0.8;
}

/* Mobile */
@media (max-width: 640px) {
  qm-sidebar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 100%;
    border-right: none;
    z-index: 100;
    max-width: none;
  }

  qm-sidebar.hidden-mobile {
    display: none;
  }

  .chat-main {
    flex-direction: column;
  }

  #app-right {
    position: absolute;
    left: 0;
    top: 0;
    right: 0;
    bottom: 0;
  }

  #app-right.hidden-mobile {
    display: none;
  }
}
</style>
</head>
<body>

<div id="screen-loading">
  <div class="loading-spinner"></div>
  <div>QuRay Chat wird initialisiert…</div>
</div>

<div id="screen-setup" hidden>
  <div class="setup-form">
    <h2>QuRay Chat</h2>
    <p style="margin: 0 0 12px; color: var(--muted); font-size: 13px;">
      Sichere P2P Kommunikation. Geben Sie Ihren Namen und die Relay-URL ein.
    </p>
    <input id="setup-alias" type="text" placeholder="Ihr Name" value="">
    <input id="setup-relay" type="text" placeholder="Relay URL (z.B. ws://localhost:8080)" value="ws://localhost:8080">
    <button id="setup-btn" type="button">Verbinden</button>
  </div>
</div>

<div id="app" hidden>
  <div class="chat-topbar">
    <div class="chat-topbar-left">
      <button id="btn-menu" style="font-size:16px;padding:6px 10px;border:none;background:transparent;cursor:pointer">≡</button>
      <div class="chat-topbar-title" id="topbar-title">QuRay Chat</div>
    </div>
    <div class="chat-topbar-actions">
      <button id="btn-new-chat">+ Chat</button>
      <button id="btn-settings">⚙</button>
    </div>
  </div>

  <div class="chat-main">
    <qm-sidebar id="app-sidebar"></qm-sidebar>
    <div id="app-right">
      <qm-chat id="app-chat"></qm-chat>
      <qm-composer id="app-composer"></qm-composer>
    </div>
  </div>
</div>

<!-- New Chat Dialog -->
<div id="dialog-new-chat" class="dialog-overlay" hidden>
  <div class="dialog-box">
    <h2>Neuer Chat</h2>
    <input id="new-chat-pub" type="text" placeholder="Öffentlicher Schlüssel (pub)">
    <div id="peers-list" style="margin:12px 0;padding:8px;background:var(--bg);border-radius:6px;max-height:200px;overflow-y:auto;font-size:12px;">
      Verbinde dich mit einem Relay um Online-Nutzer zu sehen.
    </div>
    <div class="dialog-buttons">
      <button onclick="document.getElementById('dialog-new-chat').hidden=true">Abbrechen</button>
      <button class="primary" id="btn-confirm-new-chat">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- Settings Dialog -->
<div id="dialog-settings" class="dialog-overlay" hidden>
  <div class="dialog-box">
    <h2>Einstellungen</h2>
    <label style="font-size:12px;color:var(--muted)">Alias</label>
    <input id="settings-alias" type="text" placeholder="Ihr Name">
    <label style="font-size:12px;color:var(--muted)">Relay URL</label>
    <input id="settings-relay" type="text" readonly style="opacity:0.6">
    <label style="font-size:12px;color:var(--muted)">Status</label>
    <div id="settings-status" style="padding:8px;background:var(--bg);border-radius:6px;font-size:13px;margin-bottom:12px;"></div>
    <label style="font-size:12px;color:var(--muted)">
      <input id="settings-push" type="checkbox"> Push-Benachrichtigungen
    </label>
    <div class="dialog-buttons">
      <button onclick="document.getElementById('dialog-settings').hidden=true">Schließen</button>
      <button class="primary" id="btn-save-settings">Speichern</button>
    </div>
  </div>
</div>

<script type="module">
import QuRay from '/src/quray.js'
import { MessengerPlugin } from '/src/plugins/messenger/index.js'
import { registerComponents } from '/src/ui/components.js'
import { registerMessengerComponents } from '/src/plugins/messenger/ui/components.js'
import { PushHelper } from '/src/push.js'

let qr = null
let messenger = null
let push = null
let activeConvId = null

const screenLoading = document.getElementById('screen-loading')
const screenSetup = document.getElementById('screen-setup')
const appScreen = document.getElementById('app')
const setupAlias = document.getElementById('setup-alias')
const setupRelay = document.getElementById('setup-relay')
const setupBtn = document.getElementById('setup-btn')

async function boot(relayUrl, alias) {
  try {
    screenLoading.hidden = false
    screenSetup.hidden = true
    appScreen.hidden = true

    // Initialize QuRay
    qr = await QuRay.init({
      relay: relayUrl,
      alias: alias || undefined,
      ui: true,
      presence: true,
    })

    // Save relay URL for next session
    localStorage.setItem('qr_relay_url', relayUrl)
    localStorage.setItem('qr_alias', alias || '')

    // Initialize Messenger plugin
    messenger = MessengerPlugin({
      db: qr.db,
      identity: qr.me,
      net: qr._.net,
      presence: qr._.presence,
    })
    messenger.attach(qr._.sync)

    // Register UI components
    registerComponents(qr.db, { me: qr.me, net: qr._.net })
    registerMessengerComponents()

    // Setup push notifications
    push = PushHelper(qr)
    try {
      await push.registerSW({ swUrl: '/sw.js', scope: '/' })
    } catch (e) {
      console.warn('Push registration failed:', e)
    }

    // Wire UI components
    const sidebar = document.getElementById('app-sidebar')
    const chat = document.getElementById('app-chat')
    const composer = document.getElementById('app-composer')

    sidebar.store = messenger.store
    sidebar.db = qr.db

    chat.store = messenger.store
    chat.db = qr.db
    chat.me = qr.me
    chat.calls = messenger.calls
    chat.presence = qr._.presence

    composer.store = messenger.store
    composer.db = qr.db
    composer.presence = qr._.presence
    composer.net = qr._.net

    // Handle conversation selection
    document.addEventListener('qm-conv-select', (e) => {
      activeConvId = e.detail.convId
      chat.convId = activeConvId
      composer.convId = activeConvId
      sidebar.activeConvId = activeConvId
      messenger.store.resetUnread(activeConvId).catch(() => {})
      updateTopbar()
    })

    // Show app screen
    screenLoading.hidden = true
    appScreen.hidden = false

    // Update settings UI
    document.getElementById('settings-relay').value = relayUrl
    document.getElementById('settings-alias').value = qr.me.alias || ''
    updateSettingsStatus()

    console.log('[Chat] Boot complete. Pub:', qr.me.pub.slice(0, 16) + '…')
  } catch (error) {
    console.error('[Chat] Boot failed:', error)
    alert('Fehler: ' + error.message)
    screenLoading.hidden = true
    screenSetup.hidden = false
  }
}

function updateTopbar() {
  if (!activeConvId || !messenger) return
  messenger.store.getConversations().then(convs => {
    const conv = convs.find(q => q?.data?.convId === activeConvId)?.data
    if (conv) {
      document.getElementById('topbar-title').textContent = conv.name || 'Chat'
    }
  })
}

async function updateSettingsStatus() {
  if (!qr) return
  const status = document.getElementById('settings-status')
  const relayCount = qr.relays.length
  status.innerHTML = `
    Identität: <code style="font-size:11px">${qr.me.pub.slice(0, 12)}…</code><br>
    Relays: ${relayCount} verbunden<br>
    Speicher: <span id="storage-info">-</span>
  `
}

async function loadPeersList() {
  const peersList = document.getElementById('peers-list')
  if (!qr || !qr.relays.length) {
    peersList.innerHTML = 'Nicht mit Relay verbunden'
    return
  }

  try {
    const relay = qr.relays[0]
    const httpUrl = relay.url.replace(/^ws/, 'http')
    const res = await fetch(`${httpUrl}/api/peers`)
    const data = await res.json()
    const peers = data.peers || []

    if (!peers.length) {
      peersList.innerHTML = 'Keine Online-Nutzer'
      return
    }

    peersList.innerHTML = peers
      .filter(p => p.pub !== qr.me.pub)
      .map(p => `
        <div style="padding:6px;background:var(--surface);border-radius:4px;margin-bottom:6px;cursor:pointer"
             onclick="document.getElementById('new-chat-pub').value='${p.pub}'; this.style.background='var(--primary)'; this.style.color='white'">
          <strong>${p.alias || 'Unbekannt'}</strong><br>
          <code style="font-size:10px">${p.pub.slice(0, 16)}…</code>
        </div>
      `).join('')
  } catch (e) {
    peersList.innerHTML = 'Fehler beim Laden der Peers: ' + e.message
  }
}

// Event listeners
setupBtn.onclick = async () => {
  const relay = setupRelay.value.trim()
  const alias = setupAlias.value.trim()
  if (!relay) {
    alert('Geben Sie eine Relay URL ein')
    return
  }
  await boot(relay, alias)
}

setupRelay.onkeydown = (e) => {
  if (e.key === 'Enter') setupBtn.click()
}

setupAlias.onkeydown = (e) => {
  if (e.key === 'Enter') setupBtn.click()
}

document.getElementById('btn-menu').onclick = () => {
  const sidebar = document.getElementById('app-sidebar')
  sidebar.classList.toggle('hidden-mobile')
  document.getElementById('app-right').classList.toggle('hidden-mobile')
}

document.getElementById('btn-new-chat').onclick = () => {
  document.getElementById('dialog-new-chat').hidden = false
  loadPeersList()
}

document.getElementById('btn-confirm-new-chat').onclick = async () => {
  const pub = document.getElementById('new-chat-pub').value.trim()
  if (!pub) return
  try {
    await messenger.store.addContact(pub, { alias: pub.slice(0, 12) + '…' })
    const convId = await messenger.store.getOrCreateDM(pub)
    document.getElementById('dialog-new-chat').hidden = true
    document.getElementById('new-chat-pub').value = ''
    document.querySelector('#app-sidebar').dispatchEvent(
      new CustomEvent('qm-conv-select', { detail: { convId }, bubbles: true })
    )
  } catch (e) {
    alert('Fehler: ' + e.message)
  }
}

document.getElementById('btn-settings').onclick = () => {
  document.getElementById('dialog-settings').hidden = false
}

document.getElementById('btn-save-settings').onclick = async () => {
  const newAlias = document.getElementById('settings-alias').value.trim()
  if (newAlias && qr.me.alias !== newAlias) {
    try {
      await qr.db.put('~' + qr.me.pub + '/profile', { alias: newAlias })
      qr.me.alias = newAlias
      localStorage.setItem('qr_alias', newAlias)
    } catch (e) {
      console.warn('Alias save failed:', e)
    }
  }
  document.getElementById('dialog-settings').hidden = true
}

// Check for saved relay URL on load
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('qr_relay_url')
  const alias = localStorage.getItem('qr_alias') || ''
  if (saved) {
    setupRelay.value = saved
    setupAlias.value = alias
    boot(saved, alias)
  } else {
    screenLoading.hidden = true
    screenSetup.hidden = false
  }
})
</script>

</body>
</html>
