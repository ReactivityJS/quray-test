<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="QuRay Chat - Dezentraler P2P Messenger">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#18212b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QuRay Chat</title>
<link rel="stylesheet" href="/demo/lib/demo-shell.css">
<link rel="stylesheet" href="/src/plugins/messenger/ui/messenger.css">
<style>
*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  overscroll-behavior: none;
  -webkit-text-size-adjust: 100%;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

.chat-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  padding-top: max(10px, env(safe-area-inset-top));
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 12px;
  min-height: 56px;
  flex-shrink: 0;
}
.chat-topbar-left {
  display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0;
}
.chat-topbar-title {
  font-size: 16px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-topbar-actions { display: flex; gap: 6px; }
.chat-topbar-actions button {
  padding: 7px 11px; font-size: 13px; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); border-radius: 8px; transition: all 0.15s;
  min-height: 36px;
}
.chat-topbar-actions button:hover { background: var(--bg); border-color: var(--primary); }

.chat-main {
  display: flex; flex: 1; overflow: hidden; position: relative;
}

/* Desktop sidebar */
qm-sidebar {
  min-width: 280px; max-width: 360px;
  border-right: 1px solid var(--border);
}

#app-right {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; overflow: hidden;
}

qm-chat { flex: 1; min-height: 0; }
qm-composer { flex-shrink: 0; }

/* Loading & Setup */
#screen-loading, #screen-setup {
  display: flex; align-items: center; justify-content: center;
  height: 100dvh; flex-direction: column; gap: 20px;
}
#screen-loading[hidden], #screen-setup[hidden] { display: none; }

.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border); border-top-color: var(--primary);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.setup-form {
  display: flex; flex-direction: column; gap: 12px;
  width: 100%; max-width: 340px; padding: 24px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px;
}
.setup-form h2 { margin: 0 0 4px; font-size: 20px; }
.setup-form p  { margin: 0 0 8px; color: var(--muted); font-size: 13px; }
.setup-form input {
  padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px;
  background: var(--bg); color: var(--text); font-size: 14px; outline: none;
  transition: border-color .15s;
}
.setup-form input:focus { border-color: var(--primary); }
.setup-form button {
  padding: 12px; background: var(--primary); color: white;
  border: none; border-radius: 10px; cursor: pointer;
  font-size: 15px; font-weight: 600; transition: opacity .15s;
}
.setup-form button:hover { opacity: 0.88; }

/* Mobile overrides handled in messenger.css */
@media (max-width: 768px) {
  .chat-topbar { display: none; }
  .chat-main { position: relative; }
  qm-sidebar { min-width: 0; max-width: none; border-right: none; }
}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="screen-loading">
  <div class="loading-spinner"></div>
  <div style="color:var(--muted);font-size:14px">QuRay Chat wird gestartet…</div>
</div>

<!-- Setup screen -->
<div id="screen-setup" hidden>
  <div class="setup-form">
    <h2>QuRay Chat</h2>
    <p id="setup-tagline">Sichere P2P Kommunikation.</p>
    <div id="setup-welcome" hidden style="background:rgba(103,183,255,.1);border:1px solid rgba(103,183,255,.3);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--primary)"></div>
    <div id="setup-alias-row">
      <input id="setup-alias" type="text" placeholder="Ihr Name" autocomplete="nickname">
    </div>
    <input id="setup-relay" type="text" placeholder="Relay URL (z.B. wss://example.com)" autocomplete="off">
    <div id="setup-error" hidden style="color:var(--danger,#ff7f7f);font-size:13px;padding:4px 2px;word-break:break-word"></div>
    <button id="setup-btn" type="button">Verbinden</button>
  </div>
</div>

<!-- Main app -->
<div id="app" hidden>
  <!-- Desktop topbar (hidden on mobile) -->
  <div class="chat-topbar">
    <div class="chat-topbar-left">
      <div class="chat-topbar-title">💬 QuRay Chat</div>
    </div>
    <div class="chat-topbar-actions">
      <button id="btn-new-chat">+ Chat</button>
      <button id="btn-settings">⚙</button>
    </div>
  </div>

  <div class="chat-main">
    <!-- Sidebar: chat list -->
    <qm-sidebar id="app-sidebar"></qm-sidebar>

    <!-- Chat area -->
    <div id="app-right">
      <qm-chat id="app-chat"></qm-chat>
      <qm-composer id="app-composer"></qm-composer>
    </div>

  </div>
</div>

<!-- Profile Panel View -->
<div id="view-profile" class="qm-panel-view" style="display:none">
  <div class="qm-view-header">
    <button class="qm-view-back-btn" id="profile-back-btn">‹</button>
    <div class="qm-view-header-title">Profil</div>
  </div>
  <div class="qm-view-body">
    <div class="qm-profile-avatar-section">
      <div class="qm-profile-avatar-wrap" id="profile-avatar-wrap" title="Klicken zum Ändern">
        <!-- slot: recreated with correct pub each time profile opens -->
        <div id="profile-avatar-slot" style="width:80px;height:80px;border-radius:50%;overflow:hidden"></div>
        <input id="profile-avatar-input" type="file" accept="image/*" style="display:none">
      </div>
      <div class="qm-profile-alias-display" id="profile-alias-display"></div>
    </div>

    <div class="qm-view-field">
      <label class="qm-view-label" for="profile-alias-input">Anzeigename</label>
      <input class="qm-view-input" id="profile-alias-input" type="text" placeholder="Ihr Name" autocomplete="nickname">
    </div>

    <div class="qm-view-field">
      <label class="qm-view-label">Öffentlicher Schlüssel (Pub)</label>
      <div class="qm-profile-pub-row" id="profile-pub-copy" role="button" tabindex="0" title="Tippen zum Kopieren">
        <span class="qm-profile-pub-text" id="profile-pub-display"></span>
        <span class="qm-profile-copy-btn" aria-hidden="true">📋</span>
      </div>
    </div>

    <button class="qm-view-btn" id="profile-save-btn">Speichern</button>
  </div>
</div>

<!-- Settings Panel View -->
<div id="view-settings" class="qm-panel-view" style="display:none">
  <div class="qm-view-header">
    <button class="qm-view-back-btn" id="settings-back-btn">‹</button>
    <div class="qm-view-header-title">Einstellungen</div>
  </div>
  <div class="qm-view-body">
    <div class="qm-settings-section-title">Netzwerk</div>
    <div class="qm-settings-row">
      <span class="qm-settings-row-label">Relay URL</span>
      <span id="settings-relay-display" style="font-size:12px;color:var(--muted);font-family:monospace;text-align:right;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    </div>
    <div class="qm-settings-row">
      <span class="qm-settings-row-label">Verbindung</span>
      <span id="settings-status-display" style="font-size:13px;color:var(--success)">—</span>
    </div>
    <div class="qm-settings-row">
      <span class="qm-settings-row-label">Identität</span>
      <code id="settings-id-display" style="font-size:11px;color:var(--muted)"></code>
    </div>

    <div class="qm-settings-section-title" style="margin-top:8px">Benachrichtigungen</div>
    <div class="qm-settings-row">
      <label class="qm-settings-row-label" for="settings-push-level" style="cursor:pointer">Push-Benachrichtigungen</label>
      <select id="settings-push-level" class="qm-settings-push-select">
        <option value="off">Aus</option>
        <option value="all">Alle Nachrichten</option>
        <option value="mentioned">Erwähnungen</option>
      </select>
    </div>

    <div class="qm-settings-section-title" style="margin-top:8px">Datenschutz</div>
    <div class="qm-settings-row">
      <label class="qm-settings-row-label" for="settings-visibility" style="cursor:pointer">Im Nutzerverzeichnis</label>
      <select id="settings-visibility" class="qm-settings-push-select">
        <option value="hidden">Nicht sichtbar</option>
        <option value="public">Öffentlich</option>
      </select>
    </div>

    <div style="margin-top:24px">
      <button class="qm-view-btn" id="settings-close-btn">Schließen</button>
    </div>
  </div>
</div>

<!-- New Chat Panel View -->
<div id="view-new-chat" class="qm-panel-view" style="display:none">
  <div class="qm-view-header">
    <button class="qm-view-back-btn" id="new-chat-back-btn">‹</button>
    <div class="qm-view-header-title">Neuer Chat</div>
  </div>
  <div class="qm-view-body">
    <div class="qm-view-field">
      <label class="qm-view-label" for="new-chat-pub-input">Pub-Key direkt eingeben</label>
      <input class="qm-view-input" id="new-chat-pub-input" type="text" placeholder="MFkw… (base64url)" autocomplete="off" spellcheck="false">
    </div>
    <button class="qm-view-btn" id="new-chat-confirm-btn">Chat starten</button>

    <div class="qm-settings-section-title" style="margin-top:20px">Nutzerverzeichnis</div>
    <input class="qm-view-input qm-peers-search" id="peers-search" type="text"
      placeholder="Nach Name oder Pub-Key suchen…" autocomplete="off" spellcheck="false"
      style="margin-bottom:10px">
    <div class="qm-peers-list" id="peers-online-list">
      <div style="padding:14px;color:var(--muted);font-size:13px;text-align:center">Lade…</div>
    </div>
    <p style="font-size:11px;color:var(--muted);text-align:center;margin:8px 0 0">
      Nur Nutzer mit öffentlichem Profil werden angezeigt.
    </p>
  </div>
</div>

<!-- Mobile bottom navigation -->
<nav class="qm-bottom-nav" id="bottom-nav">
  <div class="qm-bottom-nav-inner">
    <button class="qm-bottom-nav-btn active" id="nav-btn-chats">
      <span class="qm-bottom-nav-icon">💬</span>
      <span>Chats</span>
    </button>
    <button class="qm-bottom-nav-btn" id="nav-btn-new">
      <span class="qm-bottom-nav-icon">✚</span>
      <span>Neu</span>
    </button>
    <button class="qm-bottom-nav-btn" id="nav-btn-profile">
      <span class="qm-bottom-nav-icon">👤</span>
      <span>Profil</span>
    </button>
    <button class="qm-bottom-nav-btn" id="nav-btn-settings">
      <span class="qm-bottom-nav-icon">⚙</span>
      <span>Mehr</span>
    </button>
  </div>
  <div class="qm-bottom-nav-pad"></div>
</nav>

<!-- QuRouter null outlet (never injected into) -->
<div id="qu-null" hidden></div>

<script type="module">
import QuRay from '/src/quray.js'
import { MessengerPlugin } from '/src/plugins/messenger/index.js'
import { registerComponents } from '/src/ui/components.js'
import { registerMessengerComponents } from '/src/plugins/messenger/ui/components.js'
import { PushHelper } from '/src/push.js'
import { QuRouter } from '/src/plugins/qu-router.js'
import { resizeImg } from '/src/ui/profile.js'

let qr       = null
let messenger = null
let push     = null
let router   = null
let activeConvId  = null
let currentView   = 'app-sidebar'

const screenLoading = document.getElementById('screen-loading')
const screenSetup   = document.getElementById('screen-setup')
const appScreen     = document.getElementById('app')
const setupAlias    = document.getElementById('setup-alias')
const setupRelay    = document.getElementById('setup-relay')
const setupBtn      = document.getElementById('setup-btn')

// ── View management ──────────────────────────────────────────────────────

const MOBILE_BP = 768

function isMobile() { return window.innerWidth <= MOBILE_BP }

function showView(viewId) {
  currentView = viewId

  const PANEL_VIEWS = ['view-profile', 'view-settings', 'view-new-chat']

  if (isMobile()) {
    // Mobile: full-screen stacked views via .view-active class + CSS transitions
    const allViews = ['app-sidebar', 'app-right', ...PANEL_VIEWS]
    allViews.forEach(id => {
      const el = document.getElementById(id)
      if (!el) return
      el.classList.remove('view-active')
      if (PANEL_VIEWS.includes(id)) el.style.display = 'none'
    })

    const target = document.getElementById(viewId)
    if (target) {
      if (PANEL_VIEWS.includes(viewId)) target.style.display = 'flex'
      // One rAF to allow display change to paint before transition starts
      requestAnimationFrame(() => target.classList.add('view-active'))
    }

    // Update bottom nav
    const navMap = {
      'app-sidebar':   'nav-btn-chats',
      'app-right':     'nav-btn-chats',
      'view-new-chat': 'nav-btn-new',
      'view-profile':  'nav-btn-profile',
      'view-settings': 'nav-btn-settings',
    }
    document.querySelectorAll('.qm-bottom-nav-btn').forEach(b => b.classList.remove('active'))
    const activeNavId = navMap[viewId]
    if (activeNavId) document.getElementById(activeNavId)?.classList.add('active')

  } else {
    // Desktop: panel views are position:fixed right drawers — no DOM moves needed.
    // Close all panels first, then open the requested one.
    PANEL_VIEWS.forEach(id => {
      const el = document.getElementById(id)
      if (!el) return
      el.classList.remove('view-active')
      // Hide after transition ends so display:none doesn't cut off animation
      el.addEventListener('transitionend', function hide() {
        if (!el.classList.contains('view-active')) el.style.display = 'none'
        el.removeEventListener('transitionend', hide)
      }, { once: true })
    })

    if (PANEL_VIEWS.includes(viewId)) {
      const target = document.getElementById(viewId)
      if (target) {
        target.style.display = 'flex'
        requestAnimationFrame(() => target.classList.add('view-active'))
      }
    }
  }
}

function navigateTo(path) {
  if (router) {
    router.navigate(path)
  } else {
    // Pre-boot fallback
    const pathToView = {
      '/': 'app-sidebar', '/profile': 'view-profile',
      '/settings': 'view-settings', '/new-chat': 'view-new-chat',
    }
    const viewId = pathToView[path] ?? 'app-sidebar'
    showView(viewId)
  }
}

// ── Boot ────────────────────────────────────────────────────────────────

async function boot(relayUrl, alias) {
  try {
    screenLoading.hidden = false
    screenSetup.hidden = true
    appScreen.hidden = true

    // 15 s timeout — QuRay.init() hangs forever if relay is unreachable
    qr = await Promise.race([
      QuRay.init({ relay: relayUrl, alias: alias || undefined, ui: true, presence: true }),
      new Promise((_, reject) =>
        setTimeout(() => reject(new Error(
          `Keine Verbindung zum Relay (15 s Timeout). Bitte URL prüfen: ${relayUrl}`
        )), 15_000)
      ),
    ])

    localStorage.setItem('qr_relay_url', relayUrl)
    localStorage.setItem('qr_alias', alias || '')

    messenger = MessengerPlugin({
      db:       qr.db,
      identity: qr.me,
      net:      qr._.net,
      presence: qr._.presence,
    })
    messenger.attach(qr._.sync)

    registerComponents(qr.db, { me: qr.me, net: qr._.net })
    registerMessengerComponents()

    push = PushHelper(qr)
    try { await push.registerSW({ swUrl: '/sw.js', scope: '/' }) } catch (_) {}

    // Wire sidebar
    const sidebar  = document.getElementById('app-sidebar')
    const chat     = document.getElementById('app-chat')
    const composer = document.getElementById('app-composer')

    sidebar.store = messenger.store
    sidebar.db    = qr.db
    sidebar.me    = qr.me               // ← new: own avatar in header

    chat.store    = messenger.store
    chat.db       = qr.db
    chat.me       = qr.me
    chat.calls    = messenger.calls
    chat.presence = qr._.presence

    composer.store    = messenger.store
    composer.db       = qr.db
    composer.presence = qr._.presence
    composer.net      = qr._.net

    // ── QuRouter for hash-based navigation ──────────────────────────────
    router = await QuRouter.create(qr.db, {
      prefix: 'conf/chat-router/',
      outlet: '#qu-null',    // we handle rendering ourselves via onNavigate
    })

    // Register fixed routes (idempotent: same _id → same DB key)
    await Promise.all([
      router.addRoute({ _id: 'r-home',     path: '/',          title: 'Chats',        order: 1 }),
      router.addRoute({ _id: 'r-profile',  path: '/profile',   title: 'Profil',       order: 2 }),
      router.addRoute({ _id: 'r-settings', path: '/settings',  title: 'Einstellungen',order: 3 }),
      router.addRoute({ _id: 'r-newchat',  path: '/new-chat',  title: 'Neuer Chat',   order: 4 }),
    ])

    const pathToView = {
      '/':          'app-sidebar',
      '/profile':   'view-profile',
      '/settings':  'view-settings',
      '/new-chat':  'view-new-chat',
    }

    router.onNavigate((path) => {
      const viewId = pathToView[path] ?? 'app-sidebar'
      showView(viewId)
      if (path === '/profile')  populateProfileView()
      if (path === '/settings') populateSettingsView()
      if (path === '/new-chat') loadPeersList()
    })

    // ── Reactive user directory: reload when peer map changes ───────────
    qr.peers.onChange(() => {
      // Only refresh the list if the new-chat view is currently visible
      if (currentView === 'view-new-chat') loadPeersList()
      else _allKnownPeers = []   // invalidate cache so next open is fresh
    })

    // ── Show app ────────────────────────────────────────────────────────
    screenLoading.hidden = true
    appScreen.hidden = false

    // Initial view: sidebar on mobile, normal layout on desktop
    if (isMobile()) {
      showView('app-sidebar')
    }

    // Navigate to hash if present
    const initPath = window.location.hash.slice(1) || '/'
    if (initPath !== '/') router.navigate(initPath)

    console.log('[Chat] Boot complete. Pub:', qr.me.pub.slice(0, 16) + '…')
  } catch (err) {
    console.error('[Chat] Boot failed:', err)
    screenLoading.hidden = true
    screenSetup.hidden = false
    const errEl = document.getElementById('setup-error')
    if (errEl) { errEl.textContent = err.message; errEl.hidden = false }
  }
}

// ── Profile view ─────────────────────────────────────────────────────────

function populateProfileView() {
  if (!qr) return
  const aliasInput   = document.getElementById('profile-alias-input')
  const pubDisplay   = document.getElementById('profile-pub-display')
  const aliasDisplay = document.getElementById('profile-alias-display')

  if (aliasInput)   aliasInput.value       = qr.me.alias || ''
  if (pubDisplay)   pubDisplay.textContent  = qr.me.pub
  if (aliasDisplay) aliasDisplay.textContent = qr.me.alias || qr.me.pub.slice(0, 16) + '…'

  // Recreate qu-avatar fresh each open so _quInit fires with the correct pub.
  // (Static HTML elements upgrade before pub is known, so setAttribute alone
  //  doesn't trigger a re-subscribe.)
  const slot = document.getElementById('profile-avatar-slot')
  if (slot) {
    const av = document.createElement('qu-avatar')
    av.setAttribute('pub', qr.me.pub)
    av.setAttribute('size', '80')
    av.setAttribute('shape', 'circle')
    av.id = 'profile-avatar'
    slot.innerHTML = ''
    slot.appendChild(av)
  }
}

document.getElementById('profile-avatar-wrap').addEventListener('click', () => {
  document.getElementById('profile-avatar-input').click()
})

document.getElementById('profile-avatar-input').addEventListener('change', async (e) => {
  const file = e.target.files?.[0]
  if (!file || !qr) return
  e.target.value = ''   // reset for re-selection
  try {
    const blob   = await resizeImg(file, 128)
    const reader = new FileReader()
    reader.onload = async (ev) => {
      const base64 = ev.target.result   // data:image/jpeg;base64,…
      // setField is properly awaitable; setAvatar() calls a non-async setter
      await qr.node.user.setField('avatar', base64)
      document.getElementById('profile-avatar')?.setAttribute('pub', qr.me.pub)
    }
    reader.readAsDataURL(blob)
  } catch (err) {
    console.warn('[Profile] Avatar upload failed:', err)
  }
})

document.getElementById('profile-save-btn').addEventListener('click', async () => {
  if (!qr) return
  const newAlias = document.getElementById('profile-alias-input').value.trim()
  if (newAlias) {
    try {
      await qr.node.user.setAlias(newAlias)   // ← correct API (not db.put)
      localStorage.setItem('qr_alias', newAlias)
      // Update sidebar header reactively (it watches ~pub/**)
      document.getElementById('profile-alias-display').textContent = newAlias
    } catch (err) {
      console.warn('[Profile] Alias save failed:', err)
    }
  }
  navigateTo('/')
})

document.getElementById('profile-pub-copy').addEventListener('click', async () => {
  const pub = qr?.me?.pub
  if (!pub) return
  const icon = document.querySelector('#profile-pub-copy .qm-profile-copy-btn')
  try {
    await navigator.clipboard.writeText(pub)
  } catch (_) {
    // Fallback for non-HTTPS
    const ta = Object.assign(document.createElement('textarea'), {
      value: pub, style: 'position:fixed;opacity:0',
    })
    document.body.appendChild(ta)
    ta.select(); document.execCommand('copy')
    document.body.removeChild(ta)
  }
  if (icon) icon.textContent = '✓'
  setTimeout(() => { if (icon) icon.textContent = '📋' }, 1500)
})

document.getElementById('profile-pub-copy').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault()
    document.getElementById('profile-pub-copy').click()
  }
})

document.getElementById('profile-back-btn').addEventListener('click', () => navigateTo('/'))

// ── Settings view ─────────────────────────────────────────────────────────

async function populateSettingsView() {
  if (!qr) return
  const relayUrl = localStorage.getItem('qr_relay_url') || ''
  document.getElementById('settings-relay-display').textContent = relayUrl
  document.getElementById('settings-status-display').textContent =
    qr.relays.length ? `${qr.relays.length} verbunden` : 'Getrennt'
  document.getElementById('settings-id-display').textContent =
    qr.me.pub.slice(0, 20) + '…'

  const pushLevel = localStorage.getItem('qr_push_level') || 'off'
  const pushSelect = document.getElementById('settings-push-level')
  if (pushSelect) pushSelect.value = pushLevel

  // Visibility: read from user node
  try {
    const q = await qr.db.get(`~${qr.me.pub}/status`)
    const vis = q?.data ?? 'hidden'
    const visEl = document.getElementById('settings-visibility')
    if (visEl) visEl.value = vis
  } catch (_) {}
}

document.getElementById('settings-back-btn').addEventListener('click', () => navigateTo('/'))
document.getElementById('settings-close-btn').addEventListener('click', () => navigateTo('/'))

document.getElementById('settings-push-level').addEventListener('change', async (e) => {
  const level = e.target.value
  localStorage.setItem('qr_push_level', level)
  if (qr) {
    try { await qr.node.user.setField('pushLevel', level) } catch (_) {}
  }
})

document.getElementById('settings-visibility').addEventListener('change', async (e) => {
  if (qr) {
    try { await qr.node.user.setVisibility(e.target.value) } catch (_) {}
  }
})

// ── New Chat view ─────────────────────────────────────────────────────────

let _allKnownPeers = []

async function loadPeersList() {
  if (!qr) return

  // 1. Start from reactive PeerMap (includes peers synced from relay + DB)
  const byPub = new Map()
  for (const p of (qr.peers?.all ?? [])) {
    if (p.pub === qr.me.pub) continue
    byPub.set(p.pub, { pub: p.pub, alias: p.alias || null, online: p.online, epub: p.epub })
  }

  // 2. Also query local DB for any ~{pub}/alias entries not yet in PeerMap
  try {
    const rows = await qr.db.query('~')
    for (const q of rows) {
      const m = q.key.match(/^~([^/]+)\/alias$/)
      if (!m) continue
      const pub = m[1]
      if (pub === qr.me.pub) continue
      if (!byPub.has(pub)) {
        byPub.set(pub, { pub, alias: q.data || null, online: false, epub: null })
      } else if (!byPub.get(pub).alias && q.data) {
        byPub.get(pub).alias = q.data
      }
    }
  } catch (_) {}

  _allKnownPeers = [...byPub.values()].sort((a, b) => {
    if (a.online !== b.online) return (b.online ? 1 : 0) - (a.online ? 1 : 0)
    return (a.alias || '').localeCompare(b.alias || '')
  })

  renderFilteredPeers()
}

function renderFilteredPeers() {
  const list    = document.getElementById('peers-online-list')
  const query   = (document.getElementById('peers-search')?.value || '').toLowerCase()
  if (!list) return

  const peers = query
    ? _allKnownPeers.filter(p => (p.alias || p.pub).toLowerCase().includes(query))
    : _allKnownPeers

  if (!peers.length) {
    list.innerHTML = `<div style="padding:14px;color:var(--muted);font-size:13px;text-align:center">
      ${_allKnownPeers.length ? 'Keine Treffer' : 'Noch keine bekannten Nutzer.<br>Pub-Key direkt eingeben oder mit Relay verbinden.'}
    </div>`
    return
  }

  list.innerHTML = peers.map(p => `
    <div class="qm-peer-row" data-pub="${p.pub}">
      <qu-avatar pub="${p.pub}" size="36" shape="circle"></qu-avatar>
      <div style="flex:1;min-width:0">
        <div class="qm-peer-row-name">${p.alias ? _esc(p.alias) : 'Unbekannt'}</div>
        <div class="qm-peer-row-pub">${p.pub.slice(0, 22)}…</div>
      </div>
      ${p.online ? '<span style="color:var(--success,#42d392);font-size:10px;font-weight:700;flex-shrink:0">● Online</span>' : ''}
    </div>
  `).join('')

  list.querySelectorAll('.qm-peer-row').forEach(row => {
    row.addEventListener('click', () => {
      document.getElementById('new-chat-pub-input').value = row.dataset.pub
      list.querySelectorAll('.qm-peer-row').forEach(r => r.classList.remove('selected'))
      row.classList.add('selected')
    })
    row.addEventListener('dblclick', () => startChatWith(row.dataset.pub))
  })
}

const _esc = (s) => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))

async function startChatWith(pub) {
  if (!messenger || !pub) return
  const btn = document.getElementById('new-chat-confirm-btn')
  const origText = btn?.textContent
  if (btn) btn.textContent = '…'
  try {
    // Look up alias from known peers
    const known = _allKnownPeers.find(p => p.pub === pub)
    const alias = known?.alias || pub.slice(0, 12) + '…'
    await messenger.store.addContact(pub, { alias })
    const convId = await messenger.store.getOrCreateDM(pub)
    document.getElementById('new-chat-pub-input').value = ''
    navigateTo('/')
    setTimeout(() => {
      document.dispatchEvent(new CustomEvent('qm-conv-select', { detail: { convId } }))
    }, isMobile() ? 320 : 0)
  } catch (err) {
    console.error('[NewChat] startChatWith failed:', err)
    const errEl = document.createElement('div')
    errEl.style.cssText = 'color:var(--danger,#ff7f7f);font-size:13px;padding:6px;text-align:center'
    errEl.textContent = 'Fehler: ' + err.message
    document.getElementById('peers-online-list')?.prepend(errEl)
    setTimeout(() => errEl.remove(), 4000)
  } finally {
    if (btn) btn.textContent = origText
  }
}

document.getElementById('new-chat-confirm-btn').addEventListener('click', () => {
  const pub = document.getElementById('new-chat-pub-input').value.trim()
  if (!pub) return
  startChatWith(pub)
})

document.getElementById('new-chat-back-btn').addEventListener('click', () => navigateTo('/'))

document.getElementById('peers-search').addEventListener('input', renderFilteredPeers)

// ── Setup form ────────────────────────────────────────────────────────────

setupBtn.onclick = async () => {
  const relay = setupRelay.value.trim()
  const alias = document.getElementById('setup-alias-row')?.hidden
    ? (getSavedIdentityAlias() || '')
    : setupAlias.value.trim()
  if (!relay) {
    const errEl = document.getElementById('setup-error')
    if (errEl) { errEl.textContent = 'Bitte Relay URL eingeben'; errEl.hidden = false }
    return
  }
  document.getElementById('setup-error').hidden = true
  await boot(relay, alias)
}
setupRelay.addEventListener('keydown', e => { if (e.key === 'Enter') setupBtn.click() })
setupAlias.addEventListener('keydown', e => { if (e.key === 'Enter') setupBtn.click() })

// ── Window resize: re-apply layout ───────────────────────────────────────

window.addEventListener('resize', () => {
  // Re-apply layout if crossing the breakpoint
  if (!appScreen.hidden) showView(currentView)
})

// ── Auto-detect relay URL from current page's protocol + host ────────────

function defaultRelayUrl() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws'
  return `${proto}://${location.host}`
}

// Try to read alias from the saved identity backup (stored by QuRay in localStorage).
// The backup is JSON-serialised as { pub, epub, alias, signPriv, encPriv }.
function getSavedIdentityAlias() {
  try {
    const raw = localStorage.getItem('qr_identity')
    if (!raw) return null
    const d = JSON.parse(raw)
    return d?.alias || d?.data?.alias || null
  } catch (_) { return null }
}

// ── Auto-boot from localStorage ───────────────────────────────────────────

window.addEventListener('DOMContentLoaded', () => {
  const savedRelay = localStorage.getItem('qr_relay_url')
  const savedAlias = getSavedIdentityAlias() || localStorage.getItem('qr_alias') || ''

  setupRelay.value = savedRelay || defaultRelayUrl()

  const aliasRow    = document.getElementById('setup-alias-row')
  const welcomeEl   = document.getElementById('setup-welcome')
  const taglineEl   = document.getElementById('setup-tagline')

  if (savedAlias) {
    // Returning user — hide alias input, show welcome message
    if (aliasRow)  aliasRow.hidden  = true
    if (welcomeEl) {
      welcomeEl.textContent = `Willkommen zurück, ${savedAlias} 👋`
      welcomeEl.hidden = false
    }
    if (taglineEl) taglineEl.hidden = true
  } else {
    setupAlias.value = ''
  }

  if (savedRelay) {
    boot(savedRelay, savedAlias)
  } else {
    screenLoading.hidden = true
    screenSetup.hidden = false
  }
})
</script>
